{{ $pag := .Paginator }}
{{ if gt $pag.TotalPages 1 }}
<nav class="pagination" style="display: flex; justify-content: center; margin-top: 50px; margin-bottom: 20px; gap: 8px;">
    {{ if $pag.HasPrev }}
    <a href="{{ $pag.Prev.URL }}" style="padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 6px; color: #4f46e5; text-decoration: none; font-weight: 600; background-color: #ffffff; transition: all 0.2s;">&laquo; Prev</a>
    {{ end }}

    {{ range $pag.Pagers }}
    <a href="{{ .URL }}" style="padding: 8px 16px; border: 1px solid {{ if eq . $pag }}#4f46e5{{ else }}#e2e8f0{{ end }}; border-radius: 6px; text-decoration: none; font-weight: 600; {{ if eq . $pag }}background-color: #4f46e5; color: #ffffff;{{ else }}background-color: #ffffff; color: #64748b;{{ end }} transition: all 0.2s;">{{ .PageNumber }}</a>
    {{ end }}

    {{ if $pag.HasNext }}
    <a href="{{ $pag.Next.URL }}" style="padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 6px; color: #4f46e5; text-decoration: none; font-weight: 600; background-color: #ffffff; transition: all 0.2s;">Next &raquo;</a>
    {{ end }}
</nav>
{{ end }}
